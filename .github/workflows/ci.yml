name: CI

on:
  push:
    branches: ["master", "develop"]
  pull_request:
    branches: ["master", "develop"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  AGL_LLAMA_CPP_BUILD_JOBS: "2"
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install native dependencies
        run: scripts/ci/install-native.sh --target ubuntu-apt

      - name: Install Rust
        run: scripts/ci/install-rustup.sh

      - name: Prepare native libraries
        run: scripts/ci/prepare.sh

      - name: Workspace checks
        run: AGL_CI_SKIP_PREPARE=1 scripts/ci/check.sh

      - name: Release CLI smoke
        run: AGL_CI_SKIP_PREPARE=1 scripts/ci/release-smoke.sh
