[workspace]
members = [
    "crates/agl-assets",
    "crates/agl-chat",
    "crates/agl-client",
    "crates/agl-cli",
    "crates/agl-daemon",
    "crates/agl-tools",
    "crates/agl-hooks",
    "crates/agl-inference",
    "crates/agl-loop",
    "crates/agl-oven",
    "crates/agl-protocol",
    "crates/agl-session",
    "crates/agl-skills",
    "crates/agl-turn",
    "crates/agl-config",
    "crates/agl-events",
    "crates/agl-actions",
    "crates/agl-runtime",
    "crates/agl-matrix-bridge",
]
resolver = "3"

[workspace.package]
version = "1.0.0-alpha.6"
edition = "2024"
license = "LGPL-3.0-or-later"
repository = "https://github.com/agentlibre/agentLIBRE"

[workspace.dependencies]
agl-events = { path = "crates/agl-events" }
agl-actions = { path = "crates/agl-actions" }
agl-assets = { path = "crates/agl-assets" }
agl-chat = { path = "crates/agl-chat" }
agl-client = { path = "crates/agl-client" }
agl-daemon = { path = "crates/agl-daemon" }
agl-turn = { path = "crates/agl-turn" }
agl-config = { path = "crates/agl-config" }
agl-tools = { path = "crates/agl-tools" }
agl-hooks = { path = "crates/agl-hooks" }
agl-inference = { path = "crates/agl-inference" }
agl-loop = { path = "crates/agl-loop" }
agl-oven = { path = "crates/agl-oven" }
agl-protocol = { path = "crates/agl-protocol" }
agl-runtime = { path = "crates/agl-runtime" }
agl-session = { path = "crates/agl-session" }
agl-skills = { path = "crates/agl-skills" }
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
clap_complete = "4.5"
directories = "6"
matrix-sdk = { version = "=0.14.0", default-features = false, features = ["bundled-sqlite", "e2e-encryption", "rustls-tls"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
sha2 = "0.10"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
toml = "0.8"
tracing = "0.1"
tracing-appender = "0.2"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
