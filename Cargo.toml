[workspace]
members = [
    "crates/agl-loop",
    "crates/agl-turn",
    "crates/agl-config",
    "crates/agl-events",
    "crates/agl-actions",
]
resolver = "2"

[workspace.package]
version = "1.0.0-alpha.2"
edition = "2021"
license = "LGPL-3.0-or-later"
repository = "https://github.com/agentlibre/agentLIBRE"

[workspace.dependencies]
agl-events = { path = "crates/agl-events" }
agl-actions = { path = "crates/agl-actions" }
agl-turn = { path = "crates/agl-turn" }
agl-config = { path = "crates/agl-config" }
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
