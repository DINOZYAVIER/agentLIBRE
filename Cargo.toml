[workspace]
members = [
    "crates/agentlibre-observability",
    "crates/agentlibre-tool-protocol",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "LGPL-3.0-or-later"
repository = "https://github.com/agentlibre/agentLIBRE"

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
