[workspace]
members = [
    "crates/agl-cli",
    "crates/agl-inference",
    "crates/agl-loop",
    "crates/agl-oven",
    "crates/agl-turn",
    "crates/agl-config",
    "crates/agl-events",
    "crates/agl-actions",
    "crates/agl-runtime",
]
resolver = "3"

[workspace.package]
version = "1.0.0-alpha.4"
edition = "2024"
license = "LGPL-3.0-or-later"
repository = "https://github.com/agentlibre/agentLIBRE"

[workspace.dependencies]
agl-events = { path = "crates/agl-events" }
agl-actions = { path = "crates/agl-actions" }
agl-turn = { path = "crates/agl-turn" }
agl-config = { path = "crates/agl-config" }
agl-inference = { path = "crates/agl-inference" }
agl-oven = { path = "crates/agl-oven" }
agl-runtime = { path = "crates/agl-runtime" }
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
clap_complete = "4.5"
directories = "6"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
tracing = "0.1"
tracing-appender = "0.2"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
