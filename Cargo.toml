[workspace]
members = [
    "crates/agl-llama-cpp",
    "crates/agl-inference",
    "crates/agl-loop",
    "crates/agl-model",
    "crates/agl-observe",
    "crates/agl-turn",
    "crates/agl-config",
    "crates/agl-events",
    "crates/agl-actions",
]
resolver = "3"

[workspace.package]
version = "1.0.0-alpha.4"
edition = "2024"
license = "LGPL-3.0-or-later"
repository = "https://github.com/agentlibre/agentLIBRE"

[workspace.dependencies]
agl-events = { path = "crates/agl-events" }
agl-actions = { path = "crates/agl-actions" }
agl-turn = { path = "crates/agl-turn" }
agl-config = { path = "crates/agl-config" }
agl-inference = { path = "crates/agl-inference" }
agl-llama-cpp = { path = "crates/agl-llama-cpp" }
agl-model = { path = "crates/agl-model" }
agl-observe = { path = "crates/agl-observe" }
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
