[skill_risks]
change = ["fs.edit can change repository files; keep repo_path, diff_scope, secret_scan, and verification hooks."]
"cron-planner" = ["May propose cron jobs but must not execute or schedule until cron tools and permission grants exist."]
"memory-capture" = ["memory.suggest creates pending suggestions; approval remains outside this skill."]
"notes-capture" = ["notes.add and notes.link mutate local store; note creation must be explicit."]
"review-pack" = ["fs.edit writes review artifacts; review_pack.validate must stay required."]
rust = ["fs.edit can change workspace code; keep focused verification."]
skill = ["fs.edit changes builtin skill assets; skill_manifest.validate must stay required."]
"task-spec" = ["fs.edit writes task specs; task_spec.validate must stay required."]
